
guis:
  # |=======================|
  # |   /ah - main Page GUI |
  # |=======================|
  main_page:
    title: "<dark_gray>Market - ur-server.de"
    sort_options:
      enabled:
        name_a_z: "<blue>Name A -> Z"
        name_z_a: "<blue>Name Z -> A"
        price_h_l: "<blue>Price High -> Low"
        price_l_h: "<blue>Price Low -> High"
        price_per_piece_h_l: "<blue>Price/piece High -> Low"
        price_per_piece_l_h: "<blue>Price/piece Low -> High"
      disabled:
        name_a_z: "<gray>Name A -> Z"
        name_z_a: "<gray>Name Z -> A"
        price_h_l: "<gray>Price High -> Low"
        price_l_h: "<gray>Price Low -> High"
        price_per_piece_h_l: "<gray>Price/piece High -> Low"
        price_per_piece_l_h: "<gray>Price/piece Low -> High"
    items:
      # Supported placeholder: {ITEM_NAME}, {PRICE}
      listing:
        name: "{ITEM_NAME}"
        lore_header:
          - "<gray>(<b><green>{PRICE}</green></b><yellow>$</yellow>)</gray>"
          - "<gray>LinksKlick zum Kaufen"
          - "<gray>RechtsKlick für Mehr Informationen"
      arrow_left:
        material: BARRIER
        amount: 1
        display-name: "<gray>Placeholder"
        lore:
          - "<gray>This isA Placeholder"
          - "<gray>configure at AstrAH/config.yml"
