messages:
  listings:
    title: "<r><gray>Marktplatz"
    sort_item:
      material: "HOPPER"
      display_name: "<gray>Sortieren"
      options:
        enabled:
          name_a_z: ""
          name_z_a: ""
          price_h_l: ""
          price_l_h: ""
          price_per_piece_h_l: ""
          price_per_piece_l_h: ""
        disabled:
          name_a_z: ""
          name_z_a: ""
          price_h_l: ""
          price_l_h: ""
          price_per_piece_h_l: ""
          price_per_piece_l_h: ""


    item:
      display_name: "<r><gray>(<b><green>{PRICE}</green></b><yellow>$</yellow>)</gray><white>{ITEM_NAME}"
      lore_header:
        - "<r><gray>LinksKlick zum Kaufen"
        - "<r><gray>RechtsKlick für Mehr Informationen"
  listing_info:
    # in listing_info the following placeholders are available: {SELLER_NAME}, {BUYER_BALANCE}, {ITEM_PRICE}, {ITEM_NAME}, {ITEM_DISPLAY_NAME}, {ITEM_COUNT}, {PRICE_PER_PIECE}
    title: "<r><gray>Marktplatz - Informationen"
    info_item:
      title: "<r><gray>Informationen zum Angebot von <light_gray>{SELLER_NAME}"
      lore:
        - "<r><gray>Preis<dark_gray>:<light_gray> {ITEM_PRICE}$ <dark_gray>(<gray>{PRICE_PER_PIECE}$ pro Stück</gray>)"
        - "<r><gray>Item<dark_gray>:<light_gray> {ITEM_NAME}"
        - "<r><gray>Stückzahl<dark_gray>:<light_gray> {ITEM_COUNT}"



categories:
  - filter:
      item:
        material: "OAK_LOG"
        display_name: "<gray>Baumaterial"
        lore:
          - "<r><gray> Beschreibung..."
      rules:
        - "*LOG"
        - "*TERRACOTTA*"

  - filter:
      item:
        material: "IREON_SWORD"
        display_name: "<gray>Ausrüstung"
        lore:
          - "<r><gray> Werkzeuge und Rüstung"
      rules:
        - "*SWORD*"
        - "*PICKAXE*"
        - "*SHOVEL*"
        - "*AXE*"

settings:
  economy:
    tax_percentage: 10
#    supported economy providers at the time are:
#      plugins: "astraeconomy", "vault", "coinsengine" ...
#      other: "auto", "file".
#    setting this to auto will use the first compatible plugin in the order they are written above.
#    if none work it will use a file to store balances and provide basic commands for players to use money.
#    keep in mind that the built in economy is not compatible with other plugins and is intended for small servers where the Auctionhouse is the only way players interact with money
    provider: "auto"

