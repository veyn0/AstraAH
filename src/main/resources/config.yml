guis:
  main_page:
    title: "<dark_gray>Market - ur-server.de"
    sort_options:
      enabled:
        name_a_z: "<blue>Name A -> Z"
        name_z_a: "<blue>Name Z -> A"
        price_h_l: "<blue>Price High -> Low"
        price_l_h: "<blue>Price Low -> High"
        price_per_piece_h_l: "<blue>Price/piece High -> Low"
        price_per_piece_l_h: "<blue>Price/piece Low -> High"
      disabled:
        name_a_z: "<gray>Name A -> Z"
        name_z_a: "<gray>Name Z -> A"
        price_h_l: "<gray>Price High -> Low"
        price_l_h: "<gray>Price Low -> High"
        price_per_piece_h_l: "<gray>Price/piece High -> Low"
        price_per_piece_l_h: "<gray>Price/piece Low -> High"
    items:
      listing:
        name: "{ITEM_NAME}"
        lore_header:
          - "<gray>(<b><green>{PRICE}</green></b><yellow>$</yellow>)</gray>"
          - "<gray>Left-Click to Buy"
          - "<gray>Right-Click for More Information"
      arrow_left:
        material: ARROW
        amount: 1
        display-name: "<gray><b>Previous Page</b>"
        lore:
          - "<dark_gray>Navigate to the"
          - "<dark_gray>previous page."
      settings:
        material: CRAFTER
        amount: 1
        display-name: "<gray><b>Settings</b>"
        lore:
          - "<dark_gray>Adjust your personal"
          - "<dark_gray>market preferences."
      my_listings:
        material: CHEST
        amount: 1
        display-name: "<gray><b>My Listings</b>"
        lore:
          - "<dark_gray>View and manage"
          - "<dark_gray>your active listings."
      refresh:
        material: COMPASS
        amount: 1
        display-name: "<gray><b>Refresh</b>"
        lore:
          - "<dark_gray>Reload the current"
          - "<dark_gray>market listings."
      sort:
        material: HOPPER
        amount: 1
        display-name: "<gray><b>Sort</b>"
        lore:
          - "<dark_gray>Change the sorting"
          - "<dark_gray>order of listings."
      search:
        material: SPYGLASS
        amount: 1
        display-name: "<gray><b>Search</b>"
        lore:
          - "<dark_gray>Search for a specific"
          - "<dark_gray>item in the market."
      categories:
        material: BOOKSHELF
        amount: 1
        display-name: "<gray><b>Categories</b>"
        lore:
          - "<dark_gray>Browse listings"
          - "<dark_gray>by category."
      history:
        material: CLOCK
        amount: 1
        display-name: "<gray><b>History</b>"
        lore:
          - "<dark_gray>View your past"
          - "<dark_gray>purchases and sales."
      arrow_right:
        material: ARROW
        amount: 1
        display-name: "<gray><b>Next Page</b>"
        lore:
          - "<dark_gray>Navigate to the"
          - "<dark_gray>next page."
  create_listing_1:
    title: "<dark_gray>Create Listing - Select Item"
    items:
      cancel:
        material: BARRIER
        amount: 1
        display-name: "<gray><b>Cancel</b>"
        lore:
          - "<dark_gray>Abort and return"
          - "<dark_gray>to the market."
  create_listing_2:
    lines:
      1: "^^^^^^^^^^^^^^^"
      2: "Set Price"
      3: "_______________"
  create_listing_3:
    title: "<dark_gray>Create Listing - Confirm"
    items:
      confirm:
        material: LIME_DYE
        amount: 1
        display-name: "<gray><b>Confirm Listing</b>"
        lore:
          - "<dark_gray>Create this listing"
          - "<dark_gray>on the market."
      cancel:
        material: BARRIER
        amount: 1
        display-name: "<gray><b>Cancel</b>"
        lore:
          - "<dark_gray>Abort and return"
          - "<dark_gray>to the market."
  settings:
    title: "<dark_gray>Settings"
    items:
      categories_toggle:
        material: BOOKSHELF
        amount: 1
        display-name: "<gray><b>Toggle Categories</b>"
        lore:
          - "<dark_gray>Enable or disable the"
          - "<dark_gray>categories bar."
      history_toggle:
        material: CLOCK
        amount: 1
        display-name: "<gray><b>Toggle History</b>"
        lore:
