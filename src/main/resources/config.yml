messages:
  listings:
    title: "<reset><gray>Marktplatz"
    sort_item:
      material: "HOPPER"
      display_name: "<gray>Sortieren"
      options:
        enabled:
          name_a_z: ""
          name_z_a: ""
          price_h_l: ""
          price_l_h: ""
          price_per_piece_h_l: ""
          price_per_piece_l_h: ""
        disabled:
          name_a_z: ""
          name_z_a: ""
          price_h_l: ""
          price_l_h: ""
          price_per_piece_h_l: ""
          price_per_piece_l_h: ""
    item:
      display_name: "<gray>(<b><green>{PRICE}</green></b><yellow>$</yellow>)</gray><white>{ITEM_NAME}"
      lore_header:
        - "<gray>LinksKlick zum Kaufen"
        - "<gray>RechtsKlick für Mehr Informationen"
  listing_info:
    # in listing_info the following placeholders are available: {SELLER_NAME}, {BUYER_BALANCE}, {ITEM_PRICE}, {ITEM_NAME}, {ITEM_DISPLAY_NAME}, {ITEM_COUNT}, {PRICE_PER_PIECE}
    title: "<gray>Marktplatz - Informationen"
    info_item:
      title: "<gray>Informationen zum Angebot von <light_gray>{SELLER_NAME}"
      lore:
        - "<gray>Preis<dark_gray>:<light_gray> {ITEM_PRICE}$ <dark_gray>(<gray>{PRICE_PER_PIECE}$ pro Stück</gray>)"
        - "<gray>Item<dark_gray>:<light_gray> {ITEM_NAME}"
        - "gray>Stückzahl<dark_gray>:<light_gray> {ITEM_COUNT}"



categories:
  - filter:
      item:
        material: "OAK_LOG"
        display_name: "<gray>Baumaterial"
        lore:
          - "<gray> Beschreibung..."
      rules:
        - "*LOG"
        - "*TERRACOTTA*"

  - filter:
      item:
        material: "IREON_SWORD"
        display_name: "<gray>Ausrüstung"
        lore:
          - "<gray> Werkzeuge und Rüstung"
      rules:
        - "*SWORD*"
        - "*PICKAXE*"
        - "*SHOVEL*"
        - "*AXE*"

settings:
  economy:
    tax_percentage: 10
#    supported economy providers at the time are:
#      plugins: "astraeconomy", "vault", "coinsengine" ...
#      other: "auto", "file".
#    setting this to auto will use the first compatible plugin in the order they are written above.
#    if none work it will use a file to store balances and provide basic commands for players to use money.
#    keep in mind that the built in economy is not compatible with other plugins and is intended for small servers where the Auctionhouse is the only way players interact with money
    provider: "auto"


# if the economy provider is set to "file" it will use these settings:
economy:
  default_balance: 1000

items:
  buttons:
    insert:
    my_listings:
    prev_page:
      material: DIAMOND_SWORD
      amount: 1
      display-name: "<gold><bold>Mein Schwert</bold></gold>"
      lore:
       - "<gray>Erste Zeile"
       - "<gray>Zweite Zeile"
      custom-model-data: 1001
      unbreakable: true
      hide-flags: true
      enchantments:
        SHARPNESS: 5
        UNBREAKING: 3
    next_page:
    home:
    scroll_categories_down:
    scroll_categories_up: